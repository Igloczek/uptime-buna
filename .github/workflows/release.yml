name: Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

env:
    BUN_VERSION: "1.3.14"

jobs:
    build:
        name: Build ${{ matrix.asset_name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: bun-linux-x64
                      asset_name: pocketkuma-linux-x64
                    - target: bun-linux-arm64
                      asset_name: pocketkuma-linux-arm64
                    - target: bun-linux-x64-musl
                      asset_name: pocketkuma-linux-x64-musl
                    - target: bun-darwin-x64
                      asset_name: pocketkuma-darwin-x64
                    - target: bun-darwin-arm64
                      asset_name: pocketkuma-darwin-arm64
                    - target: bun-windows-x64
                      asset_name: pocketkuma-windows-x64

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Compile binary
              run: |
                  mkdir -p dist/releases
                  bun scripts/build/build-binary.ts \
                    --target=${{ matrix.target }} \
                    --outfile=dist/releases/${{ matrix.asset_name }}

            - name: Resolve artifact path
              id: artifact
              run: |
                  shopt -s nullglob
                  files=(dist/releases/${{ matrix.asset_name }}*)
                  if [ ${#files[@]} -eq 0 ]; then
                    echo "No release binary found for ${{ matrix.asset_name }}" >&2
                    exit 1
                  fi
                  echo "path=${files[0]}" >> "$GITHUB_OUTPUT"
                  ls -lh "${files[@]}"

            - uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.asset_name }}
                  path: ${{ steps.artifact.outputs.path }}
                  if-no-files-found: error

    release:
        name: Publish GitHub Release
        needs: build
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Generate checksums
              run: |
                  cd release-assets
                  sha256sum pocketkuma-* > checksums-sha256.txt
                  cat checksums-sha256.txt

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: |
                      release-assets/pocketkuma-*
                      release-assets/checksums-sha256.txt
