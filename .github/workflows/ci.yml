name: CI

on:
    push:
        branches:
            - master
    pull_request:

env:
    BUN_VERSION: "1.3.14"

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: ${{ env.BUN_VERSION }}

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Build frontend
              run: bun run build:frontend

            - name: Compile linux x64 binary
              run: |
                  bun scripts/build/build-binary.ts \
                    --target=bun-linux-x64 \
                    --outfile=dist/releases/pocketkuma-linux-x64
                  test -f dist/releases/pocketkuma-linux-x64
                  ls -lh dist/releases/pocketkuma-linux-x64
